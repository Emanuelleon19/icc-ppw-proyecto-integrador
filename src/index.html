<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>DevPortfolio - Emanuel & Sebastian</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- =========================================================================
       METADATOS ESTÁNDAR (SEO)
       ========================================================================= -->
  <!-- Descripción concisa de la página que aparecerá en los resultados de búsqueda de Google -->
  <meta name="description" content="Portafolio profesional de desarrolladores web - Emanuel Leon y Sebastian Zurita">
  <!-- Palabras clave para ayudar a los motores de búsqueda a indexar la temática del sitio -->
  <meta name="keywords" content="Angular, Firebase, Strapi, desarrollo web, portafolio, full stack">
  <!-- Autores del proyecto -->
  <meta name="author" content="Emanuel Leon, Sebastian Zurita">
  <!-- Indica a los bots de búsqueda que indexen el sitio y sigan sus enlaces -->
  <meta name="robots" content="index, follow">

  <!-- =========================================================================
       METADATOS OPEN GRAPH (Optimización para compartir en Redes Sociales: LinkedIn, WhatsApp, Facebook)
       ========================================================================= -->
  <!-- Título que se mostrará en la tarjeta de previsualización al compartir el enlace -->
  <meta property="og:title" content="DevPortfolio - Emanuel & Sebastian">
  <!-- Descripción corta integrada en la tarjeta de previsualización -->
  <meta property="og:description" content="Portafolio profesional de desarrolladores web especializados en soluciones modernas">
  <!-- Tipo de contenido del sitio -->
  <meta property="og:type" content="website">
  <!-- URL canónica de la aplicación en producción (Firebase Hosting) -->
  <meta property="og:url" content="https://ppw-integrador.web.app">

  <!-- =========================================================================
       METADATOS DE TWITTER CARDS (Optimización específica para X / Twitter)
       ========================================================================= -->
  <!-- Define el formato de la tarjeta de previsualización en Twitter (resumen simple) -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="DevPortfolio - Emanuel & Sebastian">
  <meta name="twitter:description" content="Portafolio profesional de desarrolladores web">
</head>
<body>
  <!-- Punto de entrada principal donde Angular montará el componente raíz de la aplicación -->
  <app-root></app-root>
</body>
</html>
